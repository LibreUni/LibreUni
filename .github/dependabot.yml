version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: chore
      prefix-development: chore
    groups:
      astro:
        patterns:
          - astro
          - '@astrojs/*'
      react:
        patterns:
          - react
          - react-dom
          - '@types/react*'
      testing:
        patterns:
          - '@playwright/*'
          - '@axe-core/*'
          - '@lhci/*'
          - colorjs.io
          - '@cantoo/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: chore
