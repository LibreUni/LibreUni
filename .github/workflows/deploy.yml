name: Deploy LibreUni to Coolify

on:
  workflow_run:
    workflows:
      - Quality
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deployment
        run: |
          COOLIFY_WEBHOOK="$(printf '%s' '${{ secrets.COOLIFY_WEBHOOK }}' | tr -d '\r\n')"
          COOLIFY_TOKEN="$(printf '%s' '${{ secrets.COOLIFY_TOKEN }}' | tr -d '\r\n')"

          curl --fail-with-body -X GET "${COOLIFY_WEBHOOK}?force=true" \
          --header "Authorization: Bearer ${COOLIFY_TOKEN}"
