# Lesson order and module grouping for this course.
# Slugs refer to sibling .mdx files without the extension.
modules:
  - title: "Foundations"
    lessons:
      - intro
      - types-declarations
      - functions-overloading
      - references-value-categories
  - title: "Object-Oriented Programming"
    lessons:
      - classes-encapsulation
      - operator-overloading
      - inheritance-polymorphism
  - title: "Generic Programming"
    lessons:
      - templates-generic
  - title: "Modern C++ Features"
    lessons:
      - smart-pointers
      - move-semantics
      - lambda-expressions
  - title: "Standard Template Library"
    lessons:
      - stl-sequence-containers
      - stl-associative-containers
      - stl-algorithms
      - iterators
  - title: "Advanced Features"
    lessons:
      - exception-handling
      - namespaces
  - title: "Metaprogramming"
    lessons:
      - type-traits
  - title: "Concurrency"
    lessons:
      - multithreading-basics
      - atomic-operations
      - condition-variables-futures
  - title: "Modern C++ Features"
    lessons:
      - optional-variant
      - string-view-span
      - structured-bindings
  - title: "Standard Library"
    lessons:
      - filesystem
  - title: "Modern C++20/23"
    lessons:
      - concepts
      - ranges
      - coroutines
      - modules
      - spaceship-operator
      - designated-initializers
      - constexpr-evolution
      - format
      - expected
  - title: "Tools and Practices"
    lessons:
      - cmake-build
      - testing-googletest
      - performance
      - memory-advanced
      - best-practices
      - cpp-journey
