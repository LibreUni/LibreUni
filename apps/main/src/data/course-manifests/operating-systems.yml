# Lesson order and module grouping for this course.
# Slugs refer to sibling .mdx files without the extension.
modules:
  - title: "Foundations"
    lessons:
      - intro-to-os
      - kernel-architectures
      - process-management
      - memory-management
      - file-systems
  - title: "System Initialization & Booting"
    lessons:
      - booting-bios-uefi
      - bootloaders-kernel-handover
  - title: "The OS Story & Lineage"
    lessons:
      - os-history
      - unix-evolution
      - windows-story
      - macos-evolution
      - linux-revolution
  - title: "Major Systems Deep Dive"
    lessons:
      - windows-internals
      - macos-darwin
      - linux-kernel-distros
      - bsd-architectures
      - mobile-ecosystems
  - title: "System Interfaces & Commands"
    lessons:
      - unix-shell
      - windows-powershell
      - package-management
      - virtualization
      - modern-trends
  - title: "Advanced Topics & UNIX Deep Dive"
    lessons:
      - posix-standards
      - unix-ipc
      - unix-daemons
      - unix-permissions-advanced
      - unix-signals
      - distributed-systems
      - kernel-designs-advanced
      - embedded-os
      - rtos-concepts
      - future-os-trends
  - title: "Laboratory: OS Development"
    lessons:
      - practical-kernel-hello
      - practical-build-run
