services:
  libreuni:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: ${APP:-main}
    image: libreuni:latest
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
