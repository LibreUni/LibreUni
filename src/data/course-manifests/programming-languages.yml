# Lesson order and module grouping for this course.
# Slugs refer to sibling .mdx files without the extension.
modules:
  - title: "Foundations of Programming Theory"
    lessons:
      - intro-to-languages
      - syntax-and-grammar
      - type-systems-semantics
      - cobol-legacy-lessons
  - title: "Computational Paradigms"
    lessons:
      - imperative-paradigm
      - object-oriented-foundations
      - functional-paradigm-intro
      - advanced-functional-concepts
      - logic-programming-prolog
      - declarative-languages
  - title: "Systems Implementation & Architecture"
    lessons:
      - memory-management-models
      - compilation-pipeline
      - interpreters-virtual-machines
      - systems-languages-design
      - concurrency-models
  - title: "Advanced Evolution & Pragmatics"
    lessons:
      - scripting-dynamic-languages
      - metaprogramming-macros
      - domain-specific-languages
      - language-pragmatics-evolution
      - future-of-languages
