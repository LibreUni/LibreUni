# Lesson order and module grouping for the Rust course.
modules:
  - title: "Foundations"
    lessons:
      - why-rust
      - variables-and-bindings
      - scalar-and-compound-types
      - functions-and-control-flow
      - ownership
      - borrowing-and-references
  - title: "Composing Types"
    lessons:
      - structs
      - enums-and-pattern-matching
      - collections
      - error-handling
      - generics
  - title: "Abstraction and Safety"
    lessons:
      - traits
      - lifetimes
      - closures-and-iterators
      - smart-pointers
      - concurrency
  - title: "Systems Programming"
    lessons:
      - module-system
      - io-and-filesystem
      - testing
      - unsafe-rust
  - title: "Advanced Topics"
    lessons:
      - macros
      - async-rust
      - performance